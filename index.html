<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financiación</title>
    
    <link rel="icon" href="icono.png" type="image/png">
    
    <style>
        :root {
            --primary: #008542; /* Verde corporativo */
            --background: #f1f3f5;
            --surface: #ffffff;
            --text: #333333;
            --text-light: #999999;
            --border: #e0e0e0;
            
            /* Colores solicitados */
            --color-cuota: #2b8a3e;     /* Verde */
            --color-gastos: #e03131;    /* Rojo */
            --color-total: #1971c2;     /* Azul */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* DISEÑO BASE (MÓVIL) */
        .container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* AJUSTE PARA ORDENADOR (PANTALLAS MEDIANAS/GRANDES) */
        @media (min-width: 768px) {
            html, body {
                padding: 30px 0; 
                align-items: flex-start; 
            }
            .container {
                height: auto;
                max-height: calc(100vh - 60px); 
                border-radius: 12px; 
                box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            }
        }

        /* ZONA SUPERIOR 100% FIJA */
        .header-fijo {
            width: 100%;
            padding: 12px 16px 0px 16px;
            background-color: var(--surface);
            z-index: 10;
            flex-shrink: 0;
        }

        /* TÍTULO CON CONTENEDOR FLEX PARA EL LOGO */
        h1 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            color: var(--primary);
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        h1 img {
            height: 1.4rem; 
            width: auto;
            display: inline-block;
        }

        .input-row {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }

        .input-group {
            flex: 1;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input[type="number"], input[type="text"] {
            width: 100%;
            padding: 10px 10px; 
            font-size: 1.05rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        input[type="number"] {
            padding-right: 35px; 
        }

        input[type="number"]:focus, input[type="text"]:focus {
            border-color: var(--primary);
        }

        .btn-borrar {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            background-color: #e0e0e0;
            color: #666666;
            border-radius: 50%;
            border: none;
            font-size: 0.75rem;
            font-weight: bold;
            display: none; 
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Bloques ocultos en pantalla (solo para impresión) */
        .importe-impresion, .atendido-impresion {
            display: none;
        }

        /* Cabecera estática */
        .cabecera-fija {
            background-color: #f8f9fa;
            color: var(--text);
            border-bottom: 2px solid var(--border);
            border-top: 1px solid var(--border);
            margin: 0 -16px; 
            padding: 0 16px;
            width: calc(100% + 32px);
        }

        .fila-tabla {
            display: flex;
            width: 100%;
            font-size: 0.85rem;
            align-items: center;
            transition: background-color 0.15s ease;
            cursor: pointer;
        }

        .col-meses  { width: 16%; text-align: center; padding: 8px 0; }
        .col-cuota  { width: 26%; text-align: right;  padding: 8px 4px; }
        .col-gastos { width: 30%; text-align: right;  padding: 8px 4px; }
        .col-total  { width: 28%; text-align: right;  padding: 8px 0; }

        .cabecera-fija .fila-tabla {
            font-weight: 700;
            cursor: default;
        }

        /* ZONA DE SCROLL NATIVA */
        .scroll-container {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin; 
            scrollbar-color: transparent transparent; 
        }

        .scroll-container::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .cuerpo-tabla {
            width: 100%;
            padding-bottom: 40px; 
        }

        .cuerpo-tabla .fila-tabla {
            border-bottom: 1px solid var(--border);
            min-height: 38px;
        }

        .cuerpo-tabla .fila-tabla.resaltada {
            background-color: rgba(0, 133, 66, 0.12) !important;
        }

        .txt-cuota { color: var(--color-cuota); font-weight: 600; }
        .txt-gastos { color: var(--color-gastos); font-weight: 600; }
        .txt-total { color: var(--color-total); font-weight: 600; }

        .fila-tabla.invalido {
            opacity: 0.35;
            background-color: #fafafa;
            cursor: not-allowed;
        }
        .fila-tabla.invalido .txt-cuota,
        .fila-tabla.invalido .txt-gastos,
        .fila-tabla.invalido .txt-total {
            color: var(--text-light) !important;
        }

        .creditos-tabla {
            text-align: center;
            padding: 60px 0;
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0.5px;
            width: 100%;
            display: block;
            transition: opacity 0.2s ease, visibility 0.2s;
        }

        .creditos-tabla.oculto {
            display: none;
            opacity: 0;
            visibility: hidden;
        }

        /* CONFIGURACIÓN DE IMPRESIÓN PERFECCIONADA A 1 PÁGINA */
        @media print {
            @page {
                size: portrait;
                margin: 1.2cm 2cm 0.8cm 2cm; 
            }
            html, body {
                background-color: #ffffff !important;
                color: #000000 !important;
                height: auto !important;
                min-height: auto !important;
                overflow: visible !important;
            }
            .container {
                box-shadow: none !important;
                max-width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            .header-fijo {
                padding: 0 0 4px 0 !important;
            }
            h1 {
                font-size: 1.3rem !important;
                margin-bottom: 12px !important;
                color: #000000 !important;
            }
            h1 img {
                height: 1.4rem !important;
                filter: grayscale(100%); 
            }
            
            /* OCULTAMOS TODA LA FILA DE CAJAS DE TEXTO SUPERIORES (IMPORTE Y ASESOR) */
            .input-row {
                display: none !important;
            }
            
            /* HACEMOS VISIBLE EL NUEVO TEXTO DEL IMPORTE */
            .importe-impresion {
                display: block !important;
                font-size: 1.05rem;
                font-weight: 700;
                color: #000000 !important;
                margin-bottom: 14px !important;
                text-align: left;
            }
            
            .cabecera-fija {
                margin: 0 !important;
                width: 100% !important;
                padding: 0 !important;
                background-color: #ffffff !important;
                border-bottom: 2px solid #000000 !important;
                border-top: 1px solid #000000 !important;
            }
            .scroll-container {
                overflow: visible !important;
                height: auto !important;
                padding: 0 !important;
            }
            .cuerpo-tabla {
                padding-bottom: 0 !important;
            }
            
            /* Ocultar por completo las filas que no cumplen el mínimo al imprimir */
            .fila-tabla.invalido {
                display: none !important;
            }
            
            .fila-tabla {
                page-break-inside: avoid;
                font-size: 0.78rem !important; 
                min-height: 25px !important;  
                border-bottom: 1px solid #cccccc !important;
                color: #000000 !important;
            }
            .col-meses, .col-cuota, .col-gastos, .col-total {
                padding: 4px 2px !important; 
            }
            .txt-cuota, .txt-gastos, .txt-total {
                color: #000000 !important;
                font-weight: 600 !important;
            }
            
            /* Bloque de firma e información inferior */
            .atendido-impresion {
                display: block !important;
                text-align: center;
                font-size: 0.8rem;
                font-weight: 600;
                color: #000000 !important;
                margin-top: 20px !important;
                page-break-inside: avoid;
            }
            
            .creditos-tabla {
                padding: 10px 0 0 0 !important;
                font-size: 0.7rem !important;
                color: #555555 !important;
                display: block !important;
                opacity: 1 !important;
                visibility: visible !important;
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-fijo">
        <h1>Financiación <img src="logo.webp" alt="Logo"></h1>
        
        <div id="importe-print-wrapper" class="importe-impresion">
            Importe de la compra: <span id="importe-value-print">0.00</span>€
        </div>
        
        <div class="input-row">
            <div class="input-group">
                <label for="importe">Importe de la compra (€)</label>
                <div class="input-wrapper">
                    <input type="number" id="importe" placeholder="Introduce importe" min="0" step="0.01" inputmode="decimal">
                    <button type="button" id="btn-borrar" class="btn-borrar">✕</button>
                </div>
            </div>
            
            <div class="input-group input-group-asesor">
                <label for="asesor">Asesor</label>
                <input type="text" id="asesor" placeholder="Nombre" autocomplete="off">
            </div>
        </div>
        
        <div class="cabecera-fija">
            <div class="fila-tabla">
                <div class="col-meses">Meses</div>
                <div class="col-cuota">Cuota</div>
                <div class="col-gastos">Gastos/Int.</div>
                <div class="col-total">Total</div>
            </div>
        </div>
    </div>

    <div class="scroll-container">
        <div id="tabla-body" class="cuerpo-tabla"></div>
        
        <div id="atendido-txt" class="atendido-impresion">Le atendió: <span id="nombre-asesor-print"></span> - <span id="fecha-print"></span></div>
        
        <div id="creditos-ben" class="creditos-tabla">Desarrollado por Ben</div>
    </div>
</div>

<script>
    const inputImporte = document.getElementById('importe');
    const inputAsesor = document.getElementById('asesor');
    const btnBorrar = document.getElementById('btn-borrar');
    const tablaBody = document.getElementById('tabla-body');
    const creditosBen = document.getElementById('creditos-ben');
    
    const importeValuePrint = document.getElementById('importe-value-print');
    const nombreAsesorPrint = document.getElementById('nombre-asesor-print');
    const fechaPrint = document.getElementById('fecha-print');

    const APLAZADO_MINIMO = 30.0;
    const INTERES_MENSUAL = 0.0151138; 

    function calcularGastos3Meses(importe) {
        if (importe <= 45.00) return 0.0;
        if (importe <= 90.00) return 1.0;
        if (importe <= 125.00) return 2.0;
        if (importe <= 250.00) return 3.0;
        if (importe <= 350.00) return 6.0;
        if (importe <= 600.00) return 8.50;
        if (importe <= 800.00) return 15.00;
        if (importe <= 1000.00) return 20.00;
        return 25.00;
    }

    function calcularAmortizacion() {
        const importe = parseFloat(inputImporte.value) || 0;
        
        // Sincronizar el valor para el texto plano de impresión
        importeValuePrint.textContent = inputImporte.value ? importe.toFixed(2) : "0.00";
        
        if (inputImporte.value.length > 0) {
            btnBorrar.style.display = 'flex';
            creditosBen.classList.add('oculto'); 
        } else {
            btnBorrar.style.display = 'none';
            creditosBen.classList.remove('oculto'); 
        }

        tablaBody.innerHTML = ''; 

        if (importe <= 0) return;

        for (let meses = 3; meses <= 36; meses++) {
            let cuota = 0;
            let importeTotal = 0;
            let extraCosteStr = '';

            if (meses === 3) {
                const gastos = calcularGastos3Meses(importe);
                importeTotal = importe + gastos;
                cuota = importeTotal / 3.0;
                extraCosteStr = `€${gastos.toFixed(2)}`;
            } else {
                cuota = (importe * INTERES_MENSUAL) / (1 - Math.pow(1 + INTERES_MENSUAL, -meses));
                importeTotal = cuota * meses;
                const intereses = importeTotal - importe;
                extraCosteStr = `€${intereses.toFixed(2)}`;
            }

            const cumpleMinimo = cuota >= APLAZADO_MINIMO;
            const claseFila = cumpleMinimo ? 'fila-tabla' : 'fila-tabla invalido';

            const filaHTML = `
                <div class="${claseFila}">
                    <div class="col-meses"><strong>${meses}</strong></div>
                    <div class="col-cuota txt-cuota">€${cuota.toFixed(2)}</div>
                    <div class="col-gastos txt-gastos">${extraCosteStr}</div>
                    <div class="col-total txt-total">€${importeTotal.toFixed(2)}</div>
                </div>
            `;
            tablaBody.insertAdjacentHTML('beforeend', filaHTML);
        }
    }

    function prepararImpresion() {
        nombreAsesorPrint.textContent = inputAsesor.value.trim() || "______";
        
        const hoy = new Date();
        const dia = String(hoy.getDate()).padStart(2, '0');
        const mes = String(hoy.getMonth() + 1).padStart(2, '0'); 
        const anio = hoy.getFullYear();
        
        fechaPrint.textContent = `${dia}/${mes}/${anio}`;
    }

    tablaBody.addEventListener('click', function(event) {
        const filaSeleccionada = event.target.closest('.fila-tabla');
        
        if (!filaSeleccionada || filaSeleccionada.classList.contains('invalido')) return;

        const filasAnteriores = tablaBody.querySelectorAll('.fila-tabla.resaltada');
        filasAnteriores.forEach(f => f.classList.remove('resaltada'));

        filaSeleccionada.classList.add('resaltada');
    });

    btnBorrar.addEventListener('click', function() {
        inputImporte.value = '';        
        btnBorrar.style.display = 'none'; 
        tablaBody.innerHTML = '';       
        creditosBen.classList.remove('oculto'); 
        importeValuePrint.textContent = "0.00";
        inputImporte.focus();           
    });

    inputImporte.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') { inputImporte.blur(); }
    });
    
    inputAsesor.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') { inputAsesor.blur(); }
    });

    inputImporte.addEventListener('input', calcularAmortizacion);
    inputAsesor.addEventListener('input', prepararImpresion);
    
    prepararImpresion();
</script>

</body>
</html>
