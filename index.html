<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Financiación ECI</title>
    <style>
        :root {
            --primary: #008542; /* Verde corporativo ECI */
            --background: #f1f3f5;
            --surface: #ffffff;
            --text: #333333;
            --text-light: #999999;
            --border: #e0e0e0;
            
            /* Colores solicitados */
            --color-cuota: #2b8a3e;     /* Verde */
            --color-gastos: #e03131;    /* Rojo */
            --color-total: #1971c2;     /* Azul */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        html, body {
            background-color: var(--background);
            color: var(--text);
            min-height: 100vh;
            width: 100%;
            display: flex;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        /* DISEÑO BASE (MÓVIL) */
        .container {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--surface);
            box-shadow: 0 0 10px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        /* AJUSTE PARA ORDENADOR (PANTALLAS MEDIANAS/GRANDES) */
        @media (min-width: 768px) {
            html, body {
                padding: 40px 0; /* Margen superior e inferior en escritorio */
                align-items: flex-start; /* Permite scroll natural si la pantalla es baja */
            }
            .container {
                height: auto;
                max-height: calc(100vh - 80px); /* Evita que se salga de la pantalla */
                border-radius: 12px; /* Esquinas redondeadas elegantes */
                box-shadow: 0 4px 20px rgba(0,0,0,0.08); /* Sombra más definida */
            }
        }

        /* ZONA SUPERIOR 100% FIJA */
        .header-fijo {
            width: 100%;
            padding: 12px 16px 0px 16px;
            background-color: var(--surface);
            z-index: 10;
            flex-shrink: 0;
        }

        h1 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            text-align: center;
            color: var(--primary);
            font-weight: 700;
        }

        .input-group {
            margin-bottom: 12px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: var(--text);
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        input[type="number"] {
            width: 100%;
            padding: 10px 40px 10px 10px; 
            font-size: 1.05rem;
            border: 2px solid var(--border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            border-color: var(--primary);
        }

        .btn-borrar {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 22px;
            height: 22px;
            background-color: #e0e0e0;
            color: #666666;
            border-radius: 50%;
            border: none;
            font-size: 0.75rem;
            font-weight: bold;
            display: none; 
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-borrar:active {
            background-color: #cccccc;
        }

        /* Cabecera estática */
        .cabecera-fija {
            background-color: #f8f9fa;
            color: var(--text);
            border-bottom: 2px solid var(--border);
            border-top: 1px solid var(--border);
            margin: 0 -16px; 
            padding: 0 16px;
            width: calc(100% + 32px);
        }

        /* Rejilla estructural con Flexbox */
        .fila-tabla {
            display: flex;
            width: 100%;
            font-size: 0.85rem;
            align-items: center;
            transition: background-color 0.15s ease;
            cursor: pointer;
        }

        .col-meses  { width: 16%; text-align: center; padding: 8px 0; }
        .col-cuota  { width: 26%; text-align: right;  padding: 8px 4px; }
        .col-gastos { width: 30%; text-align: right;  padding: 8px 4px; }
        .col-total  { width: 28%; text-align: right;  padding: 8px 0; }

        .cabecera-fija .fila-tabla {
            font-weight: 700;
            cursor: default;
        }

        /* ZONA DE SCROLL NATIVA (Ocultando barra en pantalla si se prefiere un look limpio) */
        .scroll-container {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            padding: 0 16px;
            -webkit-overflow-scrolling: touch;
            /* Suprime la visibilidad de la barra en la mayoría de navegadores modernos */
            scrollbar-width: thin; 
            scrollbar-color: transparent transparent; 
        }

        /* Ocultar barra en Chrome, Safari y Edge en vista normal */
        .scroll-container::-webkit-scrollbar {
            width: 6px;
        }
        .scroll-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .scroll-container::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }
        .scroll-container:hover::-webkit-scrollbar-thumb {
            background-color: rgba(0, 0, 0, 0.2); /* Solo se ve un poco al pasar el ratón */
        }

        .cuerpo-tabla {
            width: 100%;
            padding-bottom: 40px; 
        }

        .cuerpo-tabla .fila-tabla {
            border-bottom: 1px solid var(--border);
            min-height: 38px;
        }

        /* Estado resaltado al tocar */
        .cuerpo-tabla .fila-tabla.resaltada {
            background-color: rgba(0, 133, 66, 0.12) !important;
        }

        /* Colores asignados */
        .txt-cuota {
            color: var(--color-cuota);
            font-weight: 600;
        }

        .txt-gastos {
            color: var(--color-gastos);
            font-weight: 600;
        }

        .txt-total {
            color: var(--color-total);
            font-weight: 600;
        }

        /* Opacidad para opciones por debajo del mínimo de 30€ */
        .fila-tabla.invalido {
            opacity: 0.35;
            background-color: #fafafa;
            cursor: not-allowed;
        }
        .fila-tabla.invalido .txt-cuota,
        .fila-tabla.invalido .txt-gastos,
        .fila-tabla.invalido .txt-total {
            color: var(--text-light) !important;
        }

        /* DISEÑO ELEGANTE */
        .creditos-tabla {
            text-align: center;
            padding: 60px 0;
            font-size: 0.8rem;
            color: var(--text-light);
            font-weight: 500;
            letter-spacing: 0.5px;
            width: 100%;
            display: block;
            transition: opacity 0.2s ease, visibility 0.2s;
        }

        /* Clase para desvanecerlo y quitarlo del flujo por completo */
        .creditos-tabla.oculto {
            display: none;
            opacity: 0;
            visibility: hidden;
        }

        /* ESTILOS ESPECÍFICOS PARA IMPRESIÓN EN PAPEL */
        @media print {
            html, body {
                background-color: #fff !important;
                height: auto !important;
                overflow: visible !important;
            }
            .container {
                box-shadow: none !important;
                max-width: 100% !important;
                height: auto !important;
                overflow: visible !important;
                display: block !important;
            }
            .header-fijo {
                position: static !important;
                padding: 0 !important;
            }
            .btn-borrar {
                display: none !important; /* No queremos el botón '✕' en papel */
            }
            input[type="number"] {
                border: 1px solid #999 !important;
                -moz-appearance: textfield;
            }
            input[type="number"]::-webkit-outer-spin-button,
            input[type="number"]::-webkit-search-decoration {
                display: none;
            }
            .scroll-container {
                overflow: visible !important;
                height: auto !important;
                padding: 0 !important;
                scrollbar-width: none !important; /* Adiós barra de scroll */
            }
            .scroll-container::-webkit-scrollbar {
                display: none !important; /* Adiós barra de scroll en Chrome/Safari */
            }
            .cuerpo-tabla {
                padding-bottom: 0 !important;
            }
            .fila-tabla {
                page-break-inside: avoid; /* Evita que una fila se parta en dos páginas */
            }
            .creditos-tabla {
                padding: 30px 0 !important;
                display: block !important;
                opacity: 1 !important;
                visibility: visible !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-fijo">
        <h1>Financiación ECI</h1>
        <div class="input-group">
            <label for="importe">Importe de la compra (€)</label>
            <div class="input-wrapper">
                <input type="number" id="importe" placeholder="Introduce el importe" min="0" step="0.01" inputmode="decimal">
                <button type="button" id="btn-borrar" class="btn-borrar">✕</button>
            </div>
        </div>
        
        <div class="cabecera-fija">
            <div class="fila-tabla">
                <div class="col-meses">Meses</div>
                <div class="col-cuota">Cuota</div>
                <div class="col-gastos">Gastos/Int.</div>
                <div class="col-total">Total</div>
            </div>
        </div>
    </div>

    <div class="scroll-container">
        <div id="tabla-body" class="cuerpo-tabla"></div>
        
        <div id="creditos-ben" class="creditos-tabla">Desarrollado por Ben</div>
    </div>
</div>

<script>
    const inputImporte = document.getElementById('importe');
    const btnBorrar = document.getElementById('btn-borrar');
    const tablaBody = document.getElementById('tabla-body');
    const creditosBen = document.getElementById('creditos-ben');

    const APLAZADO_MINIMO = 30.0;
    
    const INTERES_MENSUAL = 0.0151138; 

    function calcularGastos3Meses(importe) {
        if (importe <= 45.00) return 0.0;
        if (importe <= 90.00) return 1.0;
        if (importe <= 125.00) return 2.0;
        if (importe <= 250.00) return 3.0;
        if (importe <= 350.00) return 6.0;
        if (importe <= 600.00) return 8.50;
        if (importe <= 800.00) return 15.00;
        if (importe <= 1000.00) return 20.00;
        return 25.00;
    }

    function calcularAmortizacion() {
        const importe = parseFloat(inputImporte.value) || 0;
        
        if (inputImporte.value.length > 0) {
            btnBorrar.style.display = 'flex';
            creditosBen.classList.add('oculto'); 
        } else {
            btnBorrar.style.display = 'none';
            creditosBen.classList.remove('oculto'); 
        }

        tablaBody.innerHTML = ''; 

        if (importe <= 0) return;

        for (let meses = 3; meses <= 36; meses++) {
            let cuota = 0;
            let importeTotal = 0;
            let extraCosteStr = '';

            if (meses === 3) {
                const gastos = calcularGastos3Meses(importe);
                importeTotal = importe + gastos;
                cuota = importeTotal / 3.0;
                extraCosteStr = `€${gastos.toFixed(2)}`;
            } else {
                cuota = (importe * INTERES_MENSUAL) / (1 - Math.pow(1 + INTERES_MENSUAL, -meses));
                importeTotal = cuota * meses;
                const intereses = importeTotal - importe;
                extraCosteStr = `€${intereses.toFixed(2)}`;
            }

            const cumpleMinimo = cuota >= APLAZADO_MINIMO;
            const claseFila = cumpleMinimo ? 'fila-tabla' : 'fila-tabla invalido';

            const filaHTML = `
                <div class="${claseFila}">
                    <div class="col-meses"><strong>${meses}</strong></div>
                    <div class="col-cuota txt-cuota">€${cuota.toFixed(2)}</div>
                    <div class="col-gastos txt-gastos">${extraCosteStr}</div>
                    <div class="col-total txt-total">€${importeTotal.toFixed(2)}</div>
                </div>
            `;
            tablaBody.insertAdjacentHTML('beforeend', filaHTML);
        }
    }

    tablaBody.addEventListener('click', function(event) {
        const filaSeleccionada = event.target.closest('.fila-tabla');
        
        if (!filaSeleccionada || filaSeleccionada.classList.contains('invalido')) return;

        const filasAnteriores = tablaBody.querySelectorAll('.fila-tabla.resaltada');
        filasAnteriores.forEach(f => f.classList.remove('resaltada'));

        filaSeleccionada.classList.add('resaltada');
    });

    btnBorrar.addEventListener('click', function() {
        inputImporte.value = '';        
        btnBorrar.style.display = 'none'; 
        tablaBody.innerHTML = '';       
        creditosBen.classList.remove('oculto'); 
        inputImporte.focus();           
    });

    inputImporte.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            inputImporte.blur(); 
        }
    });

    inputImporte.addEventListener('input', calcularAmortizacion);
</script>

</body>
</html>
